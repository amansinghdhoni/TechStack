<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStack - FloatChat Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
  <header>
    <div class="logo">
      <img src="TechStack_Logo-removebg-preview.png" alt="TechStack Logo">
    </div>
    <nav>
      <a href="about.html">About us</a>
      <a href="#">Explore</a>
      <a href="#">Colocation</a>
      <a href="#">Citations</a>
    </nav>
  </header>

  <div class="container">
    <main>
      <div class="top-bar">
        <div class="search-wrapper">
          <input type="text" id="location-search" placeholder="Search ocean points...">
          <ul id="suggestions" class="suggestions-list"></ul>
        </div>

        <button id="floatchat-btn" class="floatchat-card">
          <img src="FloatChat Logo.jpg" alt="FloatChat">
          <div>
            <strong>FloatChat</strong>
            <p>Dive Into Ocean Insights</p>
          </div>
        </button>
      </div>

      <div id="mapid" class="map-container"></div>
    </main>
  </div>

  <div id="chatbox" class="chatbox">
    <div class="chatbox-header">
      <span>FloatChat</span>
      <button id="close-chat">✖</button>
    </div>
    <div class="chatbox-messages" id="chatbox-messages">
      <div class="bot-message">Hi! I can help you explore oceans. Try searching!</div>
    </div>
    <div class="chatbox-input">
      <input type="text" id="chat-input" placeholder="Type a message..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
